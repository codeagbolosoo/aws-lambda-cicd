version: 0.2

phases:
  build:
    commands:
      - IMAGE_URI=$(python3 -c "import json; print(json.load(open('imageDetail.json'))['imageUri'])")
      - echo "Deploying $IMAGE_URI to production..."
      - aws lambda update-function-code --function-name $FUNCTION_NAME --image-uri $IMAGE_URI
      - aws lambda wait function-updated --function-name $FUNCTION_NAME
      - VERSION=$(aws lambda publish-version --function-name $FUNCTION_NAME --query Version --output text)
      - aws lambda update-alias --function-name $FUNCTION_NAME --name prod --function-version $VERSION
      - echo "Production deployment complete. CodeDeploy canary shift in progress..."
